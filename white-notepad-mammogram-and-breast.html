<!-- Notepad Version 4 -->
<style>
  #notepad-container-4 {
    display: flex;
    flex-direction: column;
    max-width: 100%;
    max-height: 400px;
    min-height: 400px;
    height: 100vh;
    margin: 0 auto;
    background-color: #f8f9fa;
    font-family: "Segoe UI", sans-serif;
    font-size: 16px;
    color: #212529;
    box-sizing: border-box;
    border: 1px solid #dee2e6;
    border-radius: 8px;
    padding: 10px;
  }
  #notepad-container-4 p {
    margin: 5px 0;
  }
  .tab-container-4 {
    display: flex;
    background-color: #ddd;
    border-radius: 8px 8px 0 0;
    border: 1px solid #dee2e6;
    margin-bottom: 1px;
  }
  .tab-4 {
    flex: 1;
    padding: 10px;
    background-color: #f0f0f0;
    border-radius: 8px 8px 0 0;
    text-align: center;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    color: #333;
    transition: background 0.2s;
  }
  .tab-4.active {
    background-color: #ffffff;
    border-radius: 8px 8px 0 0;
    font-size: 18px;
    color: #333;
  }
  #notepad-content-4 {
    flex-grow: 1;
    padding: 10px;
    background-color: #ffffff;
    border: 1px solid #dee2e6;
    color: black;
    overflow-y: auto;
    outline: none;
    font-size: 16px;
    font-family: inherit;
    box-sizing: border-box;
    width: 100%;
    min-height: 400px;
  }
  #button-container-4 {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
  }
  #highlight-text-4 {
    background-color: #0078d4;
  }
  #highlight-text-4:hover {
    background-color: #055a9e;
    transform: scale(1.05);
  }
  #clear-text-4 {
    background-color: #ff4c4c;
  }
  #clear-text-4:hover {
    background-color: #d93c3c;
    transform: scale(1.05);
  }
  button {
    padding: 10px 20px;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 14px;
    transition:
      background 0.2s,
      transform 0.1s;
  }
</style>
<div id="notepad-container-4">
  <h3>Screening Questions | Notepad</h3>
  <p>*Notes will disappear when you leave this page!</p>
  <div class="tab-container-4">
    <div class="tab-4 active" id="tab-new-booking-4">New Booking</div>
    <div class="tab-4" id="tab-rebook-4">Rebook</div>
  </div>
  <div id="notepad-content-4" contenteditable="true"></div>
  <div id="button-container-4">
    <button id="highlight-text-4">Highlight & Copy</button>
    <button id="clear-text-4">Clear</button>
  </div>
</div>
<script>
  function initializeNotepad4() {
    const defaultContents = {
      "new-booking": `<div>Exams ordered:&nbsp;</div>
<div>Clinical Hx:&nbsp;</div>
<div>New concerns?&nbsp;</div>
<div>Priors When and Where?&nbsp;</div>
<div>Most recent Volpara score:&nbsp;</div>
<div>Most recent BIRADS score:&nbsp;</div>
<div>Personal hx of breast CA? N</div>
<div>1st degree family hx of breast CA? N</div>
<div>Previous breast surgery? N</div>
<div>Breast implants? N</div>
<div>Pacemaker / Looprecorder? N</div>
<div>Pregnancy / breastfeeding? N</div>
<div>Pt under 300 lbs? Y</div>
<div>Patient mobile? Y</div>
<div>Pt aware of exam length? Y</div>`,
      rebook: `
      <div>Any NEW concerns?&nbsp;</div>
<div>Pt aware of exam length?&nbsp;</div>`,
    };
    let activeTab = "new-booking";
    const notepad = document.getElementById("notepad-content-4");
    function switchTab(tab) {
      activeTab = tab;
      document
        .querySelectorAll(".tab-4")
        .forEach((t) => t.classList.remove("active"));
      document.getElementById(`tab-${tab}-4`).classList.add("active");
      notepad.innerHTML = defaultContents[tab];
    }
    document
      .getElementById("tab-new-booking-4")
      .addEventListener("click", () => switchTab("new-booking"));
    document
      .getElementById("tab-rebook-4")
      .addEventListener("click", () => switchTab("rebook"));
    document
      .getElementById("highlight-text-4")
      .addEventListener("click", () => {
        const range = document.createRange();
        range.selectNodeContents(notepad);
        const selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
        document.execCommand("copy");
        alert("All text highlighted and copied!");
      });
    document.getElementById("clear-text-4").addEventListener("click", () => {
      if (confirm("Are you sure you want to clear the text?")) {
        notepad.innerHTML = defaultContents[activeTab];
      }
    });
    switchTab(activeTab);
  }
  if (
    document.readyState === "complete" ||
    document.readyState === "interactive"
  ) {
    initializeNotepad4();
  } else {
    document.addEventListener("DOMContentLoaded", initializeNotepad4);
  }
</script>
