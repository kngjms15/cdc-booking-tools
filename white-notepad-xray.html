<!-- Notepad Version 3 -->
<style>
  #notepad-container-3 {
    display: flex;
    flex-direction: column;
    max-width: 100%;
    max-height: 500px;
    min-height: 500px;
    height: 100vh;
    margin: 0 auto;
    background-color: #f8f9fa;
    font-family: "Segoe UI", sans-serif;
    font-size: 16px;
    color: #212529;
    box-sizing: border-box;
    border: 1px solid #dee2e6;
    border-radius: 8px;
    padding: 10px;
  }
  #notepad-container-3 p {
    margin: 5px 0;
  }
  .tab-container-3 {
    display: flex;
    background-color: #ddd;
    border-radius: 8px 8px 0 0;
    border: 1px solid #dee2e6;
    margin-bottom: 1px;
  }
  .tab-3 {
    flex: 1;
    padding: 10px;
    background-color: #f0f0f0;
    border-radius: 8px 8px 0 0;
    text-align: center;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    color: #333;
    transition: background 0.2s;
  }
  .tab-3.active {
    background-color: #ffffff;
    border-radius: 8px 8px 0 0;
    font-size: 18px;
    color: #333;
  }
  .alert-banner-1 {
    font-family: "Segoe UI", Arial, sans-serif;
    background: #fff4ce;
    border-left: 4px solid #ffb900;
    color: #323130;
    padding: 10px 12px;
    margin: 0 0 10px 0;
    border-radius: 4px;
    font-size: 13px;
    line-height: 1.4;
  }
  #notepad-content-3 {
    flex-grow: 1;
    padding: 10px;
    background-color: #ffffff;
    border: 1px solid #dee2e6;
    color: black;
    overflow-y: auto;
    outline: none;
    font-size: 16px;
    font-family: inherit;
    box-sizing: border-box;
    width: 100%;
    min-height: 200px;
  }
  #button-container-3 {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
  }
  #highlight-text-3 {
    background-color: #0078d4;
  }
  #highlight-text-3:hover {
    background-color: #055a9e;
    transform: scale(1.05);
  }
  #clear-text-3 {
    background-color: #ff4c4c;
  }
  #clear-text-3:hover {
    background-color: #d93c3c;
    transform: scale(1.05);
  }
  button {
    padding: 10px 20px;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 14px;
    transition:
      background 0.2s,
      transform 0.1s;
  }
</style>
<div id="notepad-container-3">
  <h3>Screening Questions | Notepad</h3>
  <p>*Notes will disappear when you leave this page!</p>
  <div class="alert-banner-1">
    <strong>Reminder:</strong> Only copy requisition wording into
    <strong>History</strong> — all patient-stated info including screening
    questions goes in <strong>Appt Notes</strong>.
  </div>
  <div class="tab-container-3">
    <div class="tab-3 active" id="tab-new-booking-3">New Booking</div>
    <div class="tab-3" id="tab-rebook-3">Rebook</div>
  </div>
  <div id="notepad-content-3" contenteditable="true"></div>
  <div id="button-container-3">
    <button id="highlight-text-3">Highlight & Copy</button>
    <button id="clear-text-3">Clear</button>
  </div>
</div>
<script>
  function initializeNotepad3() {
    const defaultContents = {
      "new-booking": `
<div>Pt under 300 lbs? Y</div>
<div>Patient mobile? Y</div>
<div>Pt aware of exam length? Y</div>`,
      rebook: `<div>Pt aware of exam length?&nbsp;</div>`,
    };
    let activeTab = "new-booking";
    const notepad = document.getElementById("notepad-content-3");
    function switchTab(tab) {
      activeTab = tab;
      document
        .querySelectorAll(".tab-3")
        .forEach((t) => t.classList.remove("active"));
      document.getElementById(`tab-${tab}-3`).classList.add("active");
      notepad.innerHTML = defaultContents[tab];
    }
    document
      .getElementById("tab-new-booking-3")
      .addEventListener("click", () => switchTab("new-booking"));
    document
      .getElementById("tab-rebook-3")
      .addEventListener("click", () => switchTab("rebook"));
    document
      .getElementById("highlight-text-3")
      .addEventListener("click", () => {
        const range = document.createRange();
        range.selectNodeContents(notepad);
        const selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
        document.execCommand("copy");
        alert("All text highlighted and copied!");
      });
    document.getElementById("clear-text-3").addEventListener("click", () => {
      if (confirm("Are you sure you want to clear the text?")) {
        notepad.innerHTML = defaultContents[activeTab];
      }
    });
    switchTab(activeTab);
  }
  if (
    document.readyState === "complete" ||
    document.readyState === "interactive"
  ) {
    initializeNotepad3();
  } else {
    document.addEventListener("DOMContentLoaded", initializeNotepad3);
  }
</script>
